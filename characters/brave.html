<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<title>PIXAR — キャラクター</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../pixar.css">
</head>
<body data-page="characters" data-movie="brave" class="page-characters char-active theme-brave">

<header>
  <div class="logo"><a href="../index.html"><img src="../img/top/Pixar_new_logo.svg" alt="PIXAR"></a></div>
  <div class="header-right">
    <div class="lang-dropdown" data-lang-dropdown>
      <button type="button" class="lang-dropdown-toggle" id="langToggle" aria-haspopup="listbox" aria-expanded="false">
        <span class="lang-dropdown-label" data-lang-current>日本語</span>
        <span class="lang-dropdown-chevron" aria-hidden="true"></span>
      </button>
      <ul class="lang-dropdown-menu" role="listbox" aria-labelledby="langToggle" hidden>
        <li><button type="button" class="lang-option" role="option" data-lang="ja">日本語</button></li>
        <li><button type="button" class="lang-option" role="option" data-lang="en">English</button></li>
        <li><button type="button" class="lang-option" role="option" data-lang="ko">한국어</button></li>
      </ul>
    </div>
    <div class="tagline" data-i18n="tagline">映画の世界へようこそ</div>
  </div>
</header>

<main class="char-page char-layout active theme-brave">
  <a class="back-btn" href="../index.html">← 映画一覧に戻る</a>
  <div class="char-intro" id="charIntro">
    <div class="char-intro-header">
      <h1 class="grad-text char-intro-title">メリダとおそろしの森</h1>
      <div class="year-badge char-intro-year">2012 · FANTASY · FAMILY</div>
      <span class="movie-tag char-intro-tag" style="color:#86efac;border-color:#16a34a">BRAVE</span>
    </div>
    <div class="char-intro-body">
      <div class="char-intro-poster">
        <img src="../img/back/pixcer.jpg" alt="メリダとおそろしの森" loading="lazy">
      </div>
      <div class="char-intro-text">
        <p class="char-intro-lead">自分の運命を自分で決めたいメリダ。母との確執が、魔法によって思わぬ形で試される。</p>
        <p class="char-intro-detail">スコットランドの古城と森を舞台に、親子の理解と自立を描く。ピクサー初のプリンセス主演作としても知られる作品です。</p>
      </div>
    </div>
    <div class="char-intro-actions">
      <a class="btn-secondary" href="../detail/brave.html">予告編を見る →</a>
    </div>
  </div>
  <div class="char-grid" id="charGrid">
      <article class="char-card" data-char="merida" style="border-color:rgba(134,239,172,0.35)">
        <span class="char-emoji">
          <img src="../img/cara/jesse.jpeg" alt="メリダ" width="200" height="150" loading="lazy">
        </span>
        <div class="char-name">メリダ</div>
        <div class="char-role">プリンセス</div>
        <p class="char-quote">自分の運命は自分で決める！</p>
      </article>
      <article class="char-card" data-char="elinor" style="border-color:rgba(134,239,172,0.35)">
        <span class="char-emoji">
          <img src="../img/cara/irs.jpeg" alt="エレノア（王妃）" width="200" height="150" loading="lazy">
        </span>
        <div class="char-name">エレノア（王妃）</div>
        <div class="char-role">王妃</div>
        <p class="char-quote">王家の伝統を守りなさい。</p>
      </article>
      <article class="char-card" data-char="fergus" style="border-color:rgba(134,239,172,0.35)">
        <span class="char-emoji">
          <img src="../img/cara/bruce.jpeg" alt="ファーガス王" width="200" height="150" loading="lazy">
        </span>
        <div class="char-name">ファーガス王</div>
        <div class="char-role">王</div>
        <p class="char-quote">熊には負けんぞ！</p>
      </article>
      <article class="char-card" data-char="mordeu" style="border-color:rgba(134,239,172,0.35)">
        <span class="char-emoji">
          <img src="../img/cara/muntz.jpg" alt="モルデュー" width="200" height="150" loading="lazy">
        </span>
        <div class="char-name">モルデュー</div>
        <div class="char-role">魔熊</div>
        <p class="char-quote">（咆哮）</p>
      </article>
      <article class="char-card" data-char="witch" style="border-color:rgba(134,239,172,0.35)">
        <span class="char-emoji">
          <img src="../img/cara/roz.jpeg" alt="森の魔女" width="200" height="150" loading="lazy">
        </span>
        <div class="char-name">森の魔女</div>
        <div class="char-role">魔法使い</div>
        <p class="char-quote">運命を変えたいなら、ケーキを。</p>
      </article>
  </div>
</main>

<script src="../js/i18n.js"></script>
<script src="../js/characters.js"></script>
<script src="../js/common.js"></script>
<script src="../js/movies-ui.js"></script>
<script src="../js/characters-page.js"></script>
</body>
</html>
