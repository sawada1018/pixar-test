<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<title>PIXAR — キャラクター</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../pixar.css">
</head>
<body data-page="characters" data-movie="luca" class="page-characters char-active theme-luca">

<header>
  <div class="logo"><a href="../index.html"><img src="../img/top/Pixar_new_logo.svg" alt="PIXAR"></a></div>
  <div class="header-right">
    <div class="lang-dropdown" data-lang-dropdown>
      <button type="button" class="lang-dropdown-toggle" id="langToggle" aria-haspopup="listbox" aria-expanded="false">
        <span class="lang-dropdown-label" data-lang-current>日本語</span>
        <span class="lang-dropdown-chevron" aria-hidden="true"></span>
      </button>
      <ul class="lang-dropdown-menu" role="listbox" aria-labelledby="langToggle" hidden>
        <li><button type="button" class="lang-option" role="option" data-lang="ja">日本語</button></li>
        <li><button type="button" class="lang-option" role="option" data-lang="en">English</button></li>
        <li><button type="button" class="lang-option" role="option" data-lang="ko">한국어</button></li>
      </ul>
    </div>
    <div class="tagline" data-i18n="tagline">映画の世界へようこそ</div>
  </div>
</header>

<main class="char-page char-layout active theme-luca">
  <a class="back-btn" href="../index.html">← 映画一覧に戻る</a>
  <div class="char-intro" id="charIntro">
    <div class="char-intro-header">
      <h1 class="grad-text char-intro-title">ルカ</h1>
      <div class="year-badge char-intro-year">2021 · FANTASY · FAMILY</div>
      <span class="movie-tag char-intro-tag" style="color:#7dd3fc;border-color:#0284c7">SUMMER</span>
    </div>
    <div class="char-intro-body">
      <div class="char-intro-poster">
        <img src="../img/back/pixcer.jpg" alt="ルカ" loading="lazy">
      </div>
      <div class="char-intro-text">
        <p class="char-intro-lead">イタリアの海辺の町で、人間の姿になって友達と過ごすルカ。秘密を守りながら、世界の広さを知っていく夏。</p>
        <p class="char-intro-detail">ルカとアルベルトの友情、そしてヴェスパでの冒険。イタリアの夏の空気感と、受け入れる勇気が心に残る作品です。</p>
      </div>
    </div>
    <div class="char-intro-actions">
      <a class="btn-secondary" href="../detail/luca.html">予告編を見る →</a>
    </div>
  </div>
  <div class="char-grid" id="charGrid">
      <article class="char-card" data-char="luca" style="border-color:rgba(125,211,252,0.35)">
        <span class="char-emoji">
          <img src="../img/cara/miguel.jpeg" alt="ルカ" width="200" height="150" loading="lazy">
        </span>
        <div class="char-name">ルカ</div>
        <div class="char-role">海の怪物</div>
        <p class="char-quote">シルエンツォ、ブラーノ！</p>
      </article>
      <article class="char-card" data-char="alberto" style="border-color:rgba(125,211,252,0.35)">
        <span class="char-emoji">
          <img src="../img/cara/russell.jpeg" alt="アルベルト" width="200" height="150" loading="lazy">
        </span>
        <div class="char-name">アルベルト</div>
        <div class="char-role">親友</div>
        <p class="char-quote">シルエンツォ！</p>
      </article>
      <article class="char-card" data-char="giulia" style="border-color:rgba(125,211,252,0.35)">
        <span class="char-emoji">
          <img src="../img/cara/colette.jpeg" alt="ジュリア" width="200" height="150" loading="lazy">
        </span>
        <div class="char-name">ジュリア</div>
        <div class="char-role">少女</div>
        <p class="char-quote">負けないわよ！</p>
      </article>
      <article class="char-card" data-char="ercole" style="border-color:rgba(125,211,252,0.35)">
        <span class="char-emoji">
          <img src="../img/cara/ego.jpeg" alt="エルコーレ" width="200" height="150" loading="lazy">
        </span>
        <div class="char-name">エルコーレ</div>
        <div class="char-role">ヴィラン</div>
        <p class="char-quote">この町は俺のものだ！</p>
      </article>
      <article class="char-card" data-char="machiavelli" style="border-color:rgba(125,211,252,0.35)">
        <span class="char-emoji">
          <img src="../img/cara/makyaberi.jpeg" alt="マキャベリ" width="200" height="150" loading="lazy">
        </span>
        <div class="char-name">マキャベリ</div>
        <div class="char-role">ジュリアの飼い猫</div>
        <p class="char-quote">ゴロゴロ……グルグル。</p>
      </article>
  </div>
</main>

<script src="../js/i18n.js"></script>
<script src="../js/characters.js"></script>
<script src="../js/common.js"></script>
<script src="../js/movies-ui.js"></script>
<script src="../js/characters-page.js"></script>
</body>
</html>
