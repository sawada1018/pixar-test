<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<title>YouTube</title>
<style>
  html, body { height: 100%; margin: 0; background: #000; }
  iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block; }
  .error { color: #fff; font-family: sans-serif; padding: 1rem; font-size: 0.9rem; }
</style>
</head>
<body>
<iframe
  id="player"
  title="YouTube"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
  allowfullscreen
  referrerpolicy="strict-origin-when-cross-origin"
></iframe>
<script>
(function () {
  var DEFAULT_BUNDLE = 'com.pixar.universe';
  var u = new URL(location.href);
  var v = u.searchParams.get('v');
  if (!v) {
    document.body.innerHTML = '<p class="error">Missing video id</p>';
    return;
  }
  var bundle = u.searchParams.get('bundle') || DEFAULT_BUNDLE;
  var appReferrer = u.searchParams.get('referrer') || ('https://' + bundle);
  var autoplay = u.searchParams.get('autoplay') !== '0';
  var params = new URLSearchParams({
    rel: '0',
    modestbranding: '1',
    playsinline: '1',
    widget_referrer: appReferrer,
    origin: appReferrer
  });
  if (autoplay) {
    params.set('autoplay', '1');
  }
  document.getElementById('player').src =
    'https://www.youtube.com/embed/' + encodeURIComponent(v) + '?' + params;
})();
</script>
</body>
</html>
